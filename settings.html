<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Vocab Learner 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 32px;
      min-height: 100vh;
    }
    h1 { font-size: 22px; color: #cba6f7; margin-bottom: 28px; }
    .section { margin-bottom: 28px; }
    .section h2 { font-size: 15px; color: #a6adc8; margin-bottom: 12px; font-weight: 500; }
    label { display: block; font-size: 13px; color: #9399b2; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      max-width: 480px;
      padding: 9px 12px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 7px;
      color: #cdd6f4;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #cba6f7; }
    .hint { font-size: 12px; color: #6c7086; margin-top: 5px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 10px;
      margin-right: 8px;
    }
    .btn-primary { background: #cba6f7; color: #1e1e2e; }
    .btn-primary:hover { background: #b4befe; }
    .btn-secondary { background: #313244; color: #cdd6f4; border: 1px solid #45475a; }
    .btn-secondary:hover { background: #45475a; }
    .status {
      display: inline-block;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 5px;
      margin-top: 8px;
    }
    .status.success { background: rgba(166,227,161,0.15); color: #a6e3a1; }
    .status.error { background: rgba(243,139,168,0.15); color: #f38ba8; }
    .gist-info {
      margin-top: 8px;
      font-size: 12px;
      color: #6c7086;
    }
    .gist-info a { color: #89b4fa; }
    hr { border: none; border-top: 1px solid #313244; margin: 28px 0; }
    .danger-zone h2 { color: #f38ba8; }
    .btn-danger { background: rgba(243,139,168,0.15); color: #f38ba8; border: 1px solid rgba(243,139,168,0.3); }
    .btn-danger:hover { background: rgba(243,139,168,0.28); }
  </style>
</head>
<body>
  <h1>⚙️ Vocab Learner 设置</h1>

  <div class="section">
    <h2>DeepSeek API Key</h2>
    <label>用于查询单词释义和翻译</label>
    <input type="password" id="deepseekKey" placeholder="sk-..." />
    <div class="hint">前往 <a href="https://platform.deepseek.com" target="_blank" style="color:#89b4fa">platform.deepseek.com</a> 获取</div>
  </div>

  <div class="section">
    <h2>GitHub 同步</h2>
    <label>Personal Access Token（需要 gist 权限）</label>
    <input type="password" id="githubToken" placeholder="ghp_..." />
    <div class="hint">前往 GitHub → Settings → Developer settings → Personal access tokens → 勾选 gist</div>

    <br/>
    <label style="margin-top:12px">Gist ID（首次留空，自动创建；已有 Gist 可填入）</label>
    <input type="text" id="gistId" placeholder="留空则自动创建" />
    <div class="gist-info" id="gistInfo"></div>
  </div>

  <div style="margin-top: 16px;">
    <button class="btn btn-primary" id="saveBtn">保存设置</button>
    <button class="btn btn-secondary" id="syncBtn">立即从 Gist 拉取</button>
    <span class="status" id="statusMsg" style="display:none"></span>
  </div>

  <hr/>

  <div class="section danger-zone">
    <h2>危险操作</h2>
    <button class="btn btn-danger" id="clearBtn">清空本地词库</button>
    <div class="hint" style="margin-top:8px">清空后无法恢复（如果有 Gist 可重新拉取）</div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
