<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>生词本 - Vocab Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }
    .header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e0e0e5;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
    }
    .header h1 { font-size: 18px; color: #7c3aed; flex-shrink: 0; }
    .learning-badge {
      font-size: 12px;
      color: #2563eb;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .learning-badge strong { font-weight: 700; }
    .search {
      flex: 1;
      max-width: 300px;
      padding: 7px 12px;
      background: #f0f0f5;
      border: 1px solid #dcdce0;
      border-radius: 7px;
      color: #1d1d1f;
      font-size: 14px;
      outline: none;
    }
    .search:focus { border-color: #7c3aed; background: #fff; }
    .tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #888;
      transition: all 0.12s;
    }
    .tab.active { background: #ede9fe; color: #7c3aed; }
    .tab:hover:not(.active) { color: #555; }


    .word-list {
      padding: 16px 24px;
      display: grid;
      gap: 10px;
    }
    .word-card {
      background: #fff;
      border: 1px solid #e8e8ec;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .word-card:hover {
      border-color: #c4b5fd;
      background: linear-gradient(90deg, #fff 0%, #faf5ff 60%, #fdf4ff 100%);
      box-shadow: 0 2px 8px rgba(124,58,237,0.08);
    }
    .word-index {
      font-size: 13px;
      color: #c4b5fd;
      width: 20px;
      flex-shrink: 0;
      padding-top: 1px;
      text-align: right;
      font-family: Georgia, 'Times New Roman', serif;
      font-style: italic;
      line-height: 1;
    }
    .word-main { flex: 1; min-width: 0; }
    .word-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .word-text { font-size: 17px; font-weight: 600; color: #7c3aed; }
    .word-phonetic { font-size: 12px; color: #aaa; }
    .word-def { font-size: 13px; color: #444; margin-bottom: 6px; }
    .word-contexts { display: flex; flex-direction: column; gap: 4px; }
    .word-context {
      font-size: 12px;
      color: #555;
      font-style: italic;
      border-left: 2px solid #d1d5db;
      padding-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .word-context-url {
      display: inline-block;
      margin-left: 6px;
      font-size: 10px;
      font-style: normal;
      color: #a78bfa;
      text-decoration: none;
      opacity: 0.7;
      vertical-align: middle;
    }
    .word-context-url:hover { opacity: 1; text-decoration: underline; }
    .word-highlight { background: none; color: #7c3aed; font-weight: 700; font-style: normal; }
    .word-meta { font-size: 11px; color: #bbb; margin-top: 6px; }
    .word-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .action-btn {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .action-btn.learn { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .action-btn.learn:hover { background: #dbeafe; }
    .action-btn.master { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .action-btn.master:hover { background: #dcfce7; }
    .action-btn.delete { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }
    .action-btn.delete:hover { background: #ffe4e6; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      margin-left: 4px;
    }
    .badge.learning { background: #eff6ff; color: #2563eb; }
    .badge.mastered { background: #f0fdf4; color: #16a34a; }
    .empty {
      text-align: center;
      padding: 60px 24px;
      color: #aaa;
    }
    .empty h2 { font-size: 16px; margin-bottom: 8px; color: #666; }

    /* 分页 */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 24px 24px;
    }
    .page-btn {
      padding: 6px 16px;
      border: 1px solid #dcdce0;
      border-radius: 6px;
      background: #fff;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .page-btn:hover:not(:disabled) { border-color: #7c3aed; color: #7c3aed; }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-info { font-size: 13px; color: #999; }

    /* 图表区域 */
    .chart-section {
      padding: 16px 24px;
    }
    .chart-title { font-size: 14px; color: #555; margin-bottom: 12px; }
    .chart-bars { display: flex; flex-direction: column; gap: 8px; }
    .chart-row { display: flex; align-items: center; gap: 10px; }
    .chart-label { font-size: 12px; color: #999; width: 80px; text-align: right; flex-shrink: 0; }
    .chart-bar-bg { flex: 1; background: #e8e8ec; border-radius: 3px; height: 10px; overflow: hidden; }
    .chart-bar { height: 100%; border-radius: 3px; background: #7c3aed; transition: width 0.4s; }
    .chart-count { font-size: 12px; color: #999; width: 30px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 生词本</h1>
    <span class="learning-badge">学习中 <strong id="learningCount">0</strong></span>
    <input type="text" class="search" id="search" placeholder="搜索单词..." />
    <div class="tabs">
      <button class="tab active" data-tab="list">单词列表</button>
      <button class="tab" data-tab="stats">学习统计</button>
    </div>
  </div>

  <!-- 单词列表 -->
  <div id="listView">
    <div class="word-list" id="wordList"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- 统计视图 -->
  <div id="statsView" style="display:none">
    <div class="chart-section">
      <div class="chart-title">最近 14 天学习趋势（新增单词数）</div>
      <div class="chart-bars" id="trendChart"></div>
    </div>
  </div>

  <script src="vocabulary.js"></script>
</body>
</html>
